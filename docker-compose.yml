services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tourplanner
      POSTGRES_USER: touruser
      POSTGRES_PASSWORD: tourpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U touruser -d tourplanner"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=tourplanner;Username=touruser;Password=tourpass"
      JwtSettings__SecretKey: "change-me-in-production-min-32-chars!!"
      JwtSettings__Issuer: "TourPlanner"
      JwtSettings__Audience: "TourPlannerUsers"
      OpenRouteService__ApiKey: "${ORS_API_KEY:-eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjJkOTYzZTQzMDk5OTQyYjBiNDkxOTBjNWNkNjhkMzQ4IiwiaCI6Im11cm11cjY0In0=}"
      OpenRouteService__BaseUrl: "https://api.openrouteservice.org"
      AllowedOrigins: "http://localhost"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
